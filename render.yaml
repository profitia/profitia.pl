services:
  - type: web
    name: profitia-pl
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        value: https://profitia-pl.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_PRIMARY_MODEL
        value: gpt-4.1
      - key: OPENAI_FALLBACK_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_CHEAP_MODEL
        value: gpt-4.1-nano
